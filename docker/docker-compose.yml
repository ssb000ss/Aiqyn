services:
  aiqyn-cpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    image: aiqyn:cpu
    container_name: aiqyn-cpu
    ports:
      - "8080:8080"
    volumes:
      - ./models:/app/models:ro
    environment:
      - AIQYN_LOG_LEVEL=INFO
      - AIQYN_MODEL_PATH=/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  aiqyn-cuda:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cuda
    image: aiqyn:cuda
    container_name: aiqyn-cuda
    ports:
      - "8080:8080"
    volumes:
      - ./models:/app/models:ro
    environment:
      - AIQYN_LOG_LEVEL=INFO
      - AIQYN_MODEL_PATH=/app/models
      - AIQYN_GPU_LAYERS=35
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    profiles: [cuda]
