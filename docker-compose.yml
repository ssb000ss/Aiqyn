services:
  aiqyn:
    build: .
    ports:
      # Host 8080 → container 8000. Host-side port is deliberately
      # non-default (8000 is widely used by Django/Flask/Astro) to
      # avoid collisions on local dev machines. Override via env if
      # needed: AIQYN_HOST_PORT=9000 docker compose up
      - "${AIQYN_HOST_PORT:-8080}:8000"
    volumes:
      # Calibration data, phrase dictionaries — writable so the app can update them
      - ./data:/app/data
      # SQLite history DB — persisted across container restarts
      - aiqyn_db:/app/data/db
      # Live source mount: editable-installed package picks up host changes
      # after `docker compose restart` (no full rebuild needed during dev).
      # Comment out for an immutable production image.
      - ./src:/app/src
    # Pull config from host .env file (cp .env.example .env to start).
    # Optional — compose silently ignores missing files via the `:` separator.
    env_file:
      - path: .env
        required: false
    environment:
      # Defaults used when not overridden by .env above.
      - AIQYN_LOG_LEVEL=INFO
      # LLM disabled by default in Docker (no Ollama service unless uncommented below)
      - AIQYN_USE_LLM=false
    restart: unless-stopped
    healthcheck:
      # Use Python (always present) instead of curl (slim image has no curl)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # give spaCy model time to load

  # -------------------------------------------------------------------------
  # Optional: Ollama for LLM-based features
  # Uncomment this block and set AIQYN_USE_LLM=true above to enable.
  # -------------------------------------------------------------------------
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   restart: unless-stopped
  #   # GPU passthrough (requires nvidia-container-toolkit):
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]

volumes:
  aiqyn_db:
  # ollama_models:   # uncomment together with the ollama service
